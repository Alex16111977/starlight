<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlight — Всі уроки</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{width:100%;min-height:100%;background:#080b1a;font-family:'Montserrat',sans-serif;color:rgba(200,216,255,.85);scroll-behavior:smooth}
body{min-height:100vh;position:relative;overflow-x:hidden}
canvas{position:fixed;inset:0;z-index:0}
.nebula{position:fixed;inset:0;z-index:1;pointer-events:none}
.nebula::before{content:'';position:absolute;width:60vw;height:60vw;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(80,60,180,.18) 0%,rgba(40,80,200,.10) 35%,transparent 70%);border-radius:50%;animation:breath 8s ease-in-out infinite alternate}
.nebula::after{content:'';position:absolute;width:35vw;height:55vw;top:30%;left:65%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(180,80,120,.10) 0%,transparent 60%);border-radius:50%;animation:breath 11s ease-in-out infinite alternate-reverse}
@keyframes breath{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(1.12)}}

.wrap{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:48px 24px 100px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;opacity:0;animation:riseIn .8s .1s ease forwards}
.back{font-size:10px;font-weight:200;letter-spacing:.4em;color:rgba(200,216,255,.5);text-transform:uppercase;text-decoration:none;transition:color .3s;padding-bottom:3px;border-bottom:1px solid transparent}
.back:hover{color:rgba(200,216,255,.9);border-bottom-color:rgba(200,216,255,.3)}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:22px;letter-spacing:.15em;color:transparent;background:linear-gradient(135deg,#8ab0ff,#c8d8ff,#fff,#d4af6e);-webkit-background-clip:text;background-clip:text}

.page-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(32px,5vw,52px);color:transparent;background:linear-gradient(135deg,#8ab0ff,#c8d8ff,#fff,#d4af6e);-webkit-background-clip:text;background-clip:text;text-align:center;margin-bottom:8px;opacity:0;animation:riseIn .9s .2s ease forwards}
.page-sub{text-align:center;font-size:10px;font-weight:200;letter-spacing:.5em;color:rgba(200,216,255,.45);text-transform:uppercase;margin-bottom:36px;opacity:0;animation:riseIn .8s .35s ease forwards}

/* Search */
.search-wrap{position:relative;margin-bottom:28px;opacity:0;animation:riseIn .8s .45s ease forwards}
.search-input{width:100%;padding:16px 52px 16px 20px;background:rgba(200,216,255,.08);border:1px solid rgba(200,216,255,.22);border-radius:16px;color:rgba(220,230,255,.95);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:200;outline:none;transition:all .3s;backdrop-filter:blur(10px)}
.search-input::placeholder{color:rgba(200,216,255,.35)}
.search-input:focus{background:rgba(200,216,255,.12);border-color:rgba(200,216,255,.4);box-shadow:0 0 0 3px rgba(138,176,255,.08)}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;pointer-events:none}
.search-clear{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(200,216,255,.5);cursor:pointer;font-size:18px;line-height:1;padding:4px;display:none;transition:color .2s}
.search-clear:hover{color:rgba(200,216,255,.9)}

/* Stats bar */
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;opacity:0;animation:riseIn .7s .55s ease forwards}
.stats-count{font-size:11px;font-weight:200;letter-spacing:.2em;color:rgba(200,216,255,.45)}
.stats-count span{color:rgba(200,216,255,.8);font-weight:300}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;opacity:0;animation:riseIn .7s .6s ease forwards}
.filter-btn{padding:7px 16px;background:rgba(200,216,255,.06);border:1px solid rgba(200,216,255,.16);border-radius:100px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:300;letter-spacing:.2em;color:rgba(200,216,255,.6);cursor:pointer;transition:all .25s;white-space:nowrap}
.filter-btn:hover{background:rgba(200,216,255,.12);border-color:rgba(200,216,255,.3);color:rgba(220,230,255,.9)}
.filter-btn.active{background:rgba(138,176,255,.18);border-color:rgba(138,176,255,.45);color:rgba(200,220,255,1)}

/* View toggle */
.view-toggle{display:flex;gap:4px}
.view-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(200,216,255,.06);border:1px solid rgba(200,216,255,.14);border-radius:8px;cursor:pointer;transition:all .25s;font-size:13px}
.view-btn:hover{background:rgba(200,216,255,.12)}
.view-btn.active{background:rgba(138,176,255,.18);border-color:rgba(138,176,255,.4)}

/* Group label */
.group-label{font-size:9px;font-weight:300;letter-spacing:.5em;text-transform:uppercase;color:rgba(200,216,255,.35);margin:32px 0 12px;padding-left:4px;display:flex;align-items:center;gap:12px}
.group-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(200,216,255,.1),transparent)}
.group-label:first-child{margin-top:0}

/* Grid view */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card-g{background:rgba(200,216,255,.07);border:1px solid rgba(200,216,255,.14);border-radius:14px;padding:20px 18px;text-decoration:none;transition:all .25s;display:block;position:relative;overflow:hidden}
.card-g::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(138,176,255,.4),transparent);opacity:0;transition:opacity .3s}
.card-g:hover{background:rgba(200,216,255,.12);border-color:rgba(200,216,255,.28);transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.card-g:hover::before{opacity:1}
.card-g:hover .cg-title{color:#fff}
.cg-emoji{font-size:24px;margin-bottom:10px;display:block}
.cg-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:17px;color:rgba(220,230,255,.92);line-height:1.3;margin-bottom:6px;transition:color .2s}
.cg-desc{font-size:10px;font-weight:200;line-height:1.7;color:rgba(200,216,255,.55)}
.cg-group-tag{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(138,176,255,.4);margin-top:10px}

/* List view */
.results-list{display:flex;flex-direction:column;gap:6px}
.card-l{background:rgba(200,216,255,.06);border:1px solid rgba(200,216,255,.12);border-radius:12px;padding:14px 18px;text-decoration:none;transition:all .22s;display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;position:relative;overflow:hidden}
.card-l::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,rgba(138,176,255,.3),transparent);opacity:0;transition:opacity .3s}
.card-l:hover{background:rgba(200,216,255,.11);border-color:rgba(200,216,255,.24);transform:translateX(4px)}
.card-l:hover::before{opacity:1}
.card-l:hover .cl-title{color:#fff}
.cl-emoji{font-size:20px;text-align:center}
.cl-body{}
.cl-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:16px;color:rgba(220,230,255,.9);transition:color .2s;line-height:1.2}
.cl-desc{font-size:10px;font-weight:200;color:rgba(200,216,255,.5);line-height:1.5;margin-top:2px}
.cl-tag{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:rgba(138,176,255,.35);white-space:nowrap}
.cl-arrow{font-size:12px;color:rgba(200,216,255,.3);transition:all .2s}
.card-l:hover .cl-arrow{color:rgba(200,216,255,.7);transform:translateX(3px)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:rgba(200,216,255,.4)}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:.4}
.empty-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;margin-bottom:8px}
.empty-sub{font-size:11px;font-weight:200;letter-spacing:.2em}

/* Read marks */
.card-g.read .cg-emoji::after,.card-l.read .cl-emoji::after{content:'✓';position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:rgba(212,175,110,.85);color:#080b1a;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif}
.card-g.read{border-color:rgba(212,175,110,.2)}
.card-l.read{border-color:rgba(212,175,110,.18)}

@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.card-g,.card-l{animation:fadeIn .25s ease forwards}

.shoot{position:fixed;width:2px;height:2px;background:white;border-radius:50%;z-index:5;pointer-events:none}
.shoot::after{content:'';position:absolute;top:50%;right:2px;transform:translateY(-50%);width:120px;height:1px;background:linear-gradient(to left,white,transparent)}

@media(max-width:600px){
  .filters{gap:6px}
  .filter-btn{font-size:9px;padding:6px 12px}
  .results-grid{grid-template-columns:1fr 1fr}
  .cl-desc{display:none}
  .cl-tag{display:none}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="nebula"></div>

<div class="wrap">
  <div class="header">
    <a class="back" href="index.html">← Home</a>
    <span class="logo">Starlight</span>
  </div>

  <h1 class="page-title">Всі уроки</h1>
  <p class="page-sub">213 тем — знайди будь-яку за секунду</p>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Шукай тему, слово, емоцію..." autocomplete="off" spellcheck="false">
    <span class="search-icon" id="searchIcon">🔍</span>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>

  <div class="stats-bar">
    <div class="stats-count">Показано: <span id="countDisplay">213</span> з 213</div>
    <div class="view-toggle">
      <div class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Сітка">⊞</div>
      <div class="view-btn" id="listBtn" onclick="setView('list')" title="Список">☰</div>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="results"></div>
</div>

let currentView = 'grid';
let currentFilter = 'all';
let searchTerm = '';
let readPages = new Set(JSON.parse(localStorage.getItem('sl_read') || '[]'));

function saveRead() { localStorage.setItem('sl_read', JSON.stringify([...readPages])); }

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchTerm = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchIcon').style.display = 'block';
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  render();
}

function getFiltered() {
  let pages = PAGES;
  if (currentFilter !== 'all') pages = pages.filter(p => p.group === currentFilter);
  if (searchTerm) {
    const words = searchTerm.toLowerCase().split(/\s+/).filter(w => w.length > 1);
    pages = pages.filter(p => {
      const haystack = (p.title + ' ' + p.desc + ' ' + p.group).toLowerCase();
      return words.every(w => haystack.includes(w));
    });
  }
  return pages;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:rgba(212,175,110,.35);color:inherit;border-radius:2px">$1</mark>');
}

function render() {
  const pages = getFiltered();
  document.getElementById('countDisplay').textContent = pages.length;
  const container = document.getElementById('results');

  if (pages.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔭</div><div class="empty-text">Нічого не знайдено</div><div class="empty-sub">Спробуй інше слово</div></div>';
    return;
  }

  const q = searchTerm.toLowerCase();
  const isSearching = !!q || currentFilter !== 'all';

  if (currentView === 'grid') {
    if (isSearching) {
      container.innerHTML = '<div class="results-grid">' +
        pages.map(p => cardGrid(p, q)).join('') + '</div>';
    } else {
      let html = '';
      const groups = GROUPS_ORDER.filter(g => pages.some(p => p.group === g));
      groups.forEach(g => {
        const gPages = pages.filter(p => p.group === g);
        if (!gPages.length) return;
        html += `<div class="group-label">${GROUP_EMOJI[g] || ''} ${g}</div>`;
        html += '<div class="results-grid">' + gPages.map(p => cardGrid(p, q)).join('') + '</div>';
      });
      container.innerHTML = html;
    }
  } else {
    if (isSearching) {
      container.innerHTML = '<div class="results-list">' +
        pages.map(p => cardList(p, q)).join('') + '</div>';
    } else {
      let html = '';
      const groups = GROUPS_ORDER.filter(g => pages.some(p => p.group === g));
      groups.forEach(g => {
        const gPages = pages.filter(p => p.group === g);
        if (!gPages.length) return;
        html += `<div class="group-label">${GROUP_EMOJI[g] || ''} ${g}</div>`;
        html += '<div class="results-list">' + gPages.map(p => cardList(p, q)).join('') + '</div>';
      });
      container.innerHTML = html;
    }
  }

  // re-attach read-click handlers
  container.querySelectorAll('[data-href]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const h = el.dataset.href;
      if (readPages.has(h)) readPages.delete(h); else readPages.add(h);
      saveRead();
      el.classList.toggle('read', readPages.has(h));
    });
  });
}

function cardGrid(p, q) {
  const isRead = readPages.has(p.href);
  return `<a class="card-g${isRead?' read':''}" href="${p.href}" data-href="${p.href}">
    <span class="cg-emoji">${p.emoji}</span>
    <div class="cg-title">${highlight(p.title, q)}</div>
    <div class="cg-desc">${highlight(p.desc, q)}</div>
    <div class="cg-group-tag">${p.group}</div>
  </a>`;
}

function cardList(p, q) {
  const isRead = readPages.has(p.href);
  return `<a class="card-l${isRead?' read':''}" href="${p.href}" data-href="${p.href}">
    <span class="cl-emoji">${p.emoji}</span>
    <div class="cl-body">
      <div class="cl-title">${highlight(p.title, q)}</div>
      <div class="cl-desc">${highlight(p.desc, q)}</div>
    </div>
    <div class="cl-right">
      <div class="cl-tag">${p.group}</div>
    </div>
    <span class="cl-arrow">→</span>
  </a>`;
}

// Build filters
function buildFilters() {
  const groups = GROUPS_ORDER;
  const wrap = document.getElementById('filters');
  let html = '<button class="filter-btn active" data-f="all" onclick="setFilter(\'all\')">Всі</button>';
  groups.forEach(g => {
    const esc = g.replace(/'/g, "\\'");
    html += `<button class="filter-btn" data-f="${g}" onclick="setFilter('${esc}')">${GROUP_EMOJI[g] || ''} ${g}</button>`;
  });
  wrap.innerHTML = html;
}

// Search input
const inp = document.getElementById('searchInput');
inp.addEventListener('input', () => {
  searchTerm = inp.value.trim();
  const hasVal = searchTerm.length > 0;
  document.getElementById('searchClear').style.display = hasVal ? 'block' : 'none';
  document.getElementById('searchIcon').style.display = hasVal ? 'none' : 'block';
  render();
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
});

buildFilters();
render();

// Stars
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
let W,H,stars=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',()=>{resize();build()});
function rand(a,b){return a+Math.random()*(b-a)}
function build(){stars=[];const N=Math.floor(W*H/2200);for(let i=0;i<N;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.2,1.4),ts:rand(.004,.016),to:rand(0,Math.PI*2),b:rand(.25,.9),col:Math.random()<.15?'#d4c8ff':Math.random()<.1?'#ffd4b0':'#c8d8ff'})}
build();
let t=0;
function draw(){ctx.clearRect(0,0,W,H);t+=.016;stars.forEach(s=>{const a=s.b*(.35+.65*(.5+.5*Math.sin(t*s.ts*60+s.to)));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col;ctx.globalAlpha=a;ctx.fill();ctx.globalAlpha=1});requestAnimationFrame(draw)}draw();
function shootStar(){const el=document.createElement('div');el.className='shoot';const sx=rand(W*.1,W*.9),sy=rand(H*.05,H*.35),ang=rand(15,45),dist=rand(180,360),dur=rand(600,1000);el.style.cssText='left:'+sx+'px;top:'+sy+'px;';document.body.appendChild(el);const rad=ang*Math.PI/180;el.animate([{transform:'translate(0,0)',opacity:1},{transform:'translate('+dist*Math.cos(rad)+'px,'+dist*Math.sin(rad)+'px)',opacity:0}],{duration:dur,easing:'ease-in',fill:'forwards'}).onfinish=()=>el.remove()}
function sched(){shootStar();setTimeout(sched,rand(5000,14000))}setTimeout(sched,4000);
</script>
